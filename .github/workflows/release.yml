name: Release Please - Release Management
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write # Required for npm provenance

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.release-please.outputs.paths_released) }}
    outputs:
      package_name: ${{ steps.package-info.outputs.package_name }}
      version: ${{ steps.get-version.outputs.version }}
      description: ${{ steps.get-version.outputs.description }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable corepack
        run: corepack enable pnpm

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get project info
        id: package-info
        run: |
          # Read package name from package.json
          package_name=$(cd "${{ matrix.path }}" && node -p "require('./package.json').name")
          # Extract NX project name from path (e.g., packages/nest-ts-valid-mongodb -> nest-ts-valid-mongodb)
          project_name=$(basename "${{ matrix.path }}")
          echo "package_name=$package_name" >> $GITHUB_OUTPUT
          echo "project_name=$project_name" >> $GITHUB_OUTPUT
          echo "Package name: $package_name"
          echo "NX Project: $project_name"

      - name: Get version and description
        id: get-version
        working-directory: ${{ matrix.path }}
        run: |
          version=$(node -p "require('./package.json').version")
          description=$(node -p "require('./package.json').description || 'No description'")
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "description=$description" >> $GITHUB_OUTPUT

      - name: Run tests
        run: pnpm nx test ${{ steps.package-info.outputs.project_name }} --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ steps.package-info.outputs.project_name }}
          path: coverage/
          retention-days: 30

      - name: Build package
        run: pnpm nx build ${{ steps.package-info.outputs.project_name }}

      - name: Verify build output
        run: |
          dist_path="${{ matrix.path }}/dist"
          if [ ! -d "$dist_path" ]; then
            echo "Error: Build output not found at $dist_path"
            exit 1
          fi
          echo "Build output found at $dist_path"

          echo "Running publint..."
          cd "${{ matrix.path }}" && pnpm dlx publint .

      - name: Publish to NPM
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            cd ${{ matrix.path }}
            pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  discord-notification:
    needs: [release-please, publish]
    if: always() && needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Set release info
        id: release-info
        run: |
          release_url="https://github.com/${{ github.repository }}/releases/tag/${{ needs.publish.outputs.package_name }}-v${{ needs.publish.outputs.version }}"
          npm_url="https://www.npmjs.com/package/${{ needs.publish.outputs.package_name }}"
          commit_author="${{ github.actor }}"
          echo "release_url=$release_url" >> $GITHUB_OUTPUT
          echo "npm_url=$npm_url" >> $GITHUB_OUTPUT
          echo "commit_author=$commit_author" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          PACKAGE_NAME: ${{ needs.publish.outputs.package_name }}
          VERSION: ${{ needs.publish.outputs.version }}
          DESCRIPTION: ${{ needs.publish.outputs.description }}
          COMMIT_AUTHOR: ${{ steps.release-info.outputs.commit_author }}
          RELEASE_URL: ${{ steps.release-info.outputs.release_url }}
          NPM_URL: ${{ steps.release-info.outputs.npm_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$PUBLISH_RESULT" = "success" ]; then
            title="New Release Published!"
            description="A new version of **${PACKAGE_NAME}** has been published to NPM."
            color=15418782
          else
            title="Release Failed!"
            description="Failed to publish **${PACKAGE_NAME}**. Check the workflow logs."
            color=15548997
          fi

          payload=$(jq -n \
            --arg title "$title" \
            --arg description "$description" \
            --argjson color "$color" \
            --arg package_name "$PACKAGE_NAME" \
            --arg version "v$VERSION" \
            --arg install_cmd "npm install ${PACKAGE_NAME}@latest" \
            --arg author "$COMMIT_AUTHOR" \
            --arg release_url "$RELEASE_URL" \
            --arg npm_url "$NPM_URL" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: $title,
                description: $description,
                color: $color,
                thumbnail: { url: "https://raw.githubusercontent.com/npm/logos/master/npm%20square/n-64.png" },
                fields: [
                  { name: "Package",         value: $package_name,  inline: true },
                  { name: "Version",          value: $version,       inline: true },
                  { name: "Description",      value: $description,   inline: false },
                  { name: "Install Command",  value: ("`" + $install_cmd + "`"), inline: false },
                  { name: "Released by",      value: $author,        inline: true },
                  { name: "Links",            value: ("[Release Notes](" + $release_url + ") | [NPM Page](" + $npm_url + ")"), inline: false }
                ],
                footer: {
                  text: $repo,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                }
              }]
            }')

          curl --fail-with-body -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK"
