name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  checks: write
  pull-requests: write

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      # --- LINTING WITH ANNOTATIONS ---
      - name: Lint (Affected)
        run: pnpm nx affected -t lint --parallel=3 -- --format json --output-file eslint-report.json
        continue-on-error: true

      - name: Annotate ESLint Results
        uses: ataylorme/eslint-annotate-action@v3
        if: always()
        with:
          report-json: eslint-report.json
          check-name: ESLint Results

      # --- TESTING WITH COVERAGE REPORT ---
      - name: Run Tests (Affected)
        run: pnpm nx affected -t test --parallel=3 --coverage

      - name: Merge Coverage Reports
        id: check-coverage
        run: |
          SUMMARY_FILES=$(find coverage/packages -name "coverage-summary.json" 2>/dev/null)
          FINAL_FILES=$(find coverage/packages -name "coverage-final.json" 2>/dev/null)
          if [ -z "$SUMMARY_FILES" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            node -e "
              const fs = require('fs');
              const files = process.argv.slice(1);
              const merged = files.reduce((acc, f) => {
                const data = JSON.parse(fs.readFileSync(f, 'utf8'));
                return Object.assign(acc, data);
              }, {});
              fs.mkdirSync('coverage/merged', { recursive: true });
              fs.writeFileSync('coverage/merged/coverage-summary.json', JSON.stringify(merged));
            " $SUMMARY_FILES
            node -e "
              const fs = require('fs');
              const files = process.argv.slice(1);
              const merged = files.reduce((acc, f) => {
                const data = JSON.parse(fs.readFileSync(f, 'utf8'));
                return Object.assign(acc, data);
              }, {});
              fs.writeFileSync('coverage/merged/coverage-final.json', JSON.stringify(merged));
            " $FINAL_FILES
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Coverage Report
        if: steps.check-coverage.outputs.exists == 'true'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: 'coverage/merged/coverage-summary.json'
          json-final-path: 'coverage/merged/coverage-final.json'

      - name: Build & Typecheck (Affected)
        run: pnpm nx affected -t build typecheck --parallel=3

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm nx run-many -t build -p zod-mongo,nest-zod-mongo

      # --- PACKAGING GATES (publint + attw) ---
      # Both packages already build ESM+CJS+types via tsdown; publint and attw
      # lint the built dist/ output, so the build step above is shared with both.
      - name: publint (zod-mongo)
        working-directory: packages/zod-mongo
        run: pnpm exec publint .

      - name: publint (nest-zod-mongo)
        working-directory: packages/nest-zod-mongo
        run: pnpm exec publint .

      - name: arethetypeswrong (zod-mongo)
        working-directory: packages/zod-mongo
        run: pnpm exec attw --pack .

      - name: arethetypeswrong (nest-zod-mongo)
        working-directory: packages/nest-zod-mongo
        run: pnpm exec attw --pack .

      # --- UNUSED EXPORT / DEPENDENCY DETECTION ---
      - name: knip
        run: pnpm exec knip

      # --- CROSS-PACKAGE PEER-RANGE CONSISTENCY ---
      - name: Check workspace peer-dependency ranges
        run: node scripts/check-peer-ranges.mjs

  mongodb-driver-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mongodb: [5, 6, 7]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pins mongodb to the matrix major for zod-mongo only — the driver compat shim
      # (src/compat/driver.ts) lives there. This mutates the runner's local node_modules/
      # resolution only; the committed pnpm-lock.yaml is never pushed from CI.
      - name: Pin mongodb driver to v${{ matrix.mongodb }} for zod-mongo
        run: pnpm --filter @wenu/mongo add -D mongodb@${{ matrix.mongodb }}

      - name: Test zod-mongo against mongodb v${{ matrix.mongodb }}
        run: pnpm nx test zod-mongo --skip-nx-cache
